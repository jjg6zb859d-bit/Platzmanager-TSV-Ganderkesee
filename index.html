<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSV PlatzManager V0.3</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>⚽ TSV Ganderkesee</h1>

<p>Digitaler Platz- und Kabinenbelegungsplan</p>

</header>

<div class="container">

<div class="card">

<h2>Dashboard</h2>

<div id="dashboard"></div>

</div>

<div class="card">

<h2>Neue Reservierung</h2>

<input type="date" id="datum">

<input type="time" id="start">

<input type="time" id="ende">

<select id="team">

<option>D1</option>
<option>D2</option>
<option>C1</option>
<option>C2</option>
<option>Herren</option>

</select>

<select id="platz">

<option>Hauptplatz A</option>
<option>Hauptplatz B</option>
<option>Hauptplatz C</option>
<option>Hauptplatz D</option>

<option>Kunstrasen Nord</option>
<option>Kunstrasen Süd</option>

<option>Trainingsplatz A</option>
<option>Trainingsplatz B</option>

<option>Jugendplatz</option>

</select>

<select id="kabine">

<option>K1 Links</option>
<option>K1 Rechts</option>

<option>K2 Links</option>
<option>K2 Rechts</option>

<option>K3 Links</option>
<option>K3 Rechts</option>

<option>K4 Links</option>
<option>K4 Rechts</option>

<option>K5 Links</option>
<option>K5 Rechts</option>

<option>K6 Links</option>
<option>K6 Rechts</option>

<option>K7 Links</option>
<option>K7 Rechts</option>

<option>K8 Links</option>
<option>K8 Rechts</option>

</select>

<button onclick="speichern()">

Reservierung speichern

</button>

</div>

<div class="card">

<h2>Tagesfilter</h2>

<input type="date" id="filterDatum" onchange="anzeigen()">

</div>

<div class="card">

<h2>Platzbelegungsplan</h2>

<div id="liste"></div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
