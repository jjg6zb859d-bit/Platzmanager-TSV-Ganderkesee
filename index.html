<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSV Ganderkesee PlatzManager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="header-inner">

<div class="logo">

⚽ TSV Ganderkesee

</div>

<div class="subtitle">

Digitaler Platz- und Kabinenbelegungsplan

</div>

<nav>

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('plaetze')">
Plätze
</button>

<button onclick="showPage('kabinen')">
Kabinen
</button>

<button onclick="showPage('teams')">
Teams
</button>

<button onclick="showPage('reservierungen')">

</button>

<section class="hero">

<p>

</p>

<div class="hero-card">

</div>

</section>

<section id="reservierungen" class="page">

<script src="modules/storage.js"></script>
<script src="modules/dashboard.js"></script>

<script src="app.js"></script>

</html>
