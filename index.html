<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSV PlatzManager V0.7</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⚽ TSV Ganderkesee</h1>
    <p>Digitaler Platz- und Kabinenbelegungsplan V0.7</p>
</header>

<main class="container">

    <section class="card admin-card">
        <h2>Benutzersteuerung</h2>

        <div id="rollenAnzeige" class="rollen-anzeige">
            Aktueller Modus: Trainer
        </div>

        <input
            type="password"
            id="adminPin"
            placeholder="Admin-PIN eingeben">

        <button onclick="adminLogin()">
            Admin-Modus aktivieren
        </button>

        <button class="secondary" onclick="trainerModus()">
            Zurück zum Trainer-Modus
        </button>
    </section>

    <section class="card">
        <h2>Dashboard</h2>
        <div id="dashboard"></div>
    </section>

    <section class="card">
        <h2 id="formularTitel">Neue Reservierung</h2>

        <label>Datum</label>
        <input type="date" id="datum">

        <label>Startzeit</label>
        <input type="time" id="start">

        <label>Endzeit</label>
        <input type="time" id="ende">

        <label>Team</label>
        <select id="team"></select>

        <label>Platzbereich</label>
        <select id="platz"></select>

        <label>Kabine</label>
        <select id="kabine"></select>

        <label>Status</label>
        <select id="status">
            <option>Entwurf</option>
            <option>Reserviert</option>
            <option>Freigegeben</option>
            <option>Gesperrt</option>
        </select>

        <label>Notiz</label>
        <textarea
            id="notiz"
            placeholder="z. B. Testspiel, Platzpflege, Turnier, Gastmannschaft"></textarea>

        <button id="speicherButton" onclick="speichern()">
            Reservierung speichern
        </button>

        <button id="abbrechenButton" class="secondary hidden" onclick="bearbeitungAbbrechen()">
            Bearbeitung abbrechen
        </button>
    </section>

    <section class="card">
        <h2>Tagesansicht / Platzmatrix</h2>

        <label>Tag auswählen</label>
        <input type="date" id="tagesDatum" onchange="aktualisieren()">

        <div id="tagesplan" class="tagesplan"></div>
    </section>

    <section class="card">
        <h2>Wochenansicht</h2>

        <label>Woche auswählen</label>
        <input type="date" id="wochenDatum" onchange="aktualisieren()">

        <div id="wochenplan" class="wochenplan"></div>
    </section>

    <section class="card">
        <h2>Filter</h2>

        <label>Team filtern</label>
        <select id="filterTeam" onchange="anzeigen()">
            <option>Alle Teams</option>
        </select>

        <label>Status filtern</label>
        <select id="filterStatus" onchange="anzeigen()">
            <option>Alle Status</option>
            <option>Entwurf</option>
            <option>Reserviert</option>
            <option>Freigegeben</option>
            <option>Gesperrt</option>
        </select>
    </section>

    <section class="card">
        <h2>Alle Reservierungen</h2>
        <div id="liste"></div>
    </section>

    <section class="card">
        <h2>Daten sichern / wiederherstellen</h2>

        <button onclick="exportJSON()">
            JSON Backup exportieren
        </button>

        <input type="file" id="importDatei" accept=".json" onchange="importJSON(event)">

        <button class="danger" onclick="alleDatenLoeschen()">
            Alle Daten löschen
        </button>
    </section>

</main>

<script src="app.js"></script>

</body>
</html>
